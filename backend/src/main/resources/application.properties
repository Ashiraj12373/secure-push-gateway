# ─────────────────────────────────────────────────────
#  Secure Push Gateway — Spring Boot Configuration
# ─────────────────────────────────────────────────────
#  Copy to application-local.properties and fill in
#  secrets. Never commit secrets to version control.
# ─────────────────────────────────────────────────────

spring.application.name=secure-push-gateway

# ── Database ──────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/securepushgateway?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Mail (Gmail SMTP) ─────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ── JWT ───────────────────────────────────────────────
jwt.secret=${JWT_SECRET:change-me-in-production-use-256bit-key}
jwt.expiration-ms=86400000

# ── GitHub ────────────────────────────────────────────
github.webhook.secret=${GITHUB_WEBHOOK_SECRET:}
github.token=${GITHUB_TOKEN:}

# ── Async ─────────────────────────────────────────────
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=50

# ── JPA / Jackson ─────────────────────────────────────
spring.jpa.open-in-view=true
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Thymeleaf ─────────────────────────────────────────
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ── Server ────────────────────────────────────────────
server.port=8080
server.error.include-message=always

# ── Logging ───────────────────────────────────────────
logging.level.com.securepushgateway=DEBUG
logging.level.org.springframework.security=WARN
