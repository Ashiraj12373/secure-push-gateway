<!-- badge-awarded.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Badge Earned</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 24px; }
    .container { max-width: 560px; margin: 0 auto; background: #0f172a; border-radius: 16px; overflow: hidden; }
    .header { padding: 32px; text-align: center; }
    .badge-icon { font-size: 64px; display: block; margin-bottom: 12px; }
    .badge-name { color: #e2e8f0; font-size: 22px; font-weight: 900; }
    .badge-desc { color: #64748b; font-size: 14px; margin-top: 6px; }
    .body { background: #fff; padding: 28px 32px; font-size: 14px; color: #475569; line-height: 1.6; }
    .footer { padding: 16px 32px; background: #f8fafc; font-size: 12px; color: #94a3b8; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="badge-icon">🏆</span>
    <div class="badge-name" th:text="${badgeName}">Badge Name</div>
    <div class="badge-desc" th:text="${badgeDesc}">Description</div>
  </div>
  <div class="body">
    <p>Congratulations, <strong th:text="${developerName}">Developer</strong>!</p>
    <p>You've earned the <strong th:text="${badgeName}">Badge</strong> badge on SecurePush Gateway. Keep up the clean code habits!</p>
  </div>
  <div class="footer">Sent by SecurePush Gateway.</div>
</div>
</body>
</html>
